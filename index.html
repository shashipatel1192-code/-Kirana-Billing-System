<!DOCTYPE html>
<html>
<head>
<title>Kirana Receipt</title>

<style>
body {
  font-family: monospace;
  background: #f5f5f5;
}

.receipt {
  width: 280px;
  margin: auto;
  background: white;
  padding: 10px;
  border: 1px solid #000;
}

.center {
  text-align: center;
}

hr {
  border: 1px dashed black;
}

table {
  width: 100%;
  font-size: 14px;
}

td {
  padding: 2px 0;
}

input {
  width: 100%;
  border: none;
  font-family: monospace;
}

button {
  margin-top: 10px;
  width: 100%;
}

@media print {
  body {
    background: white;
  }
  button {
    display: none;
  }
}
</style>

</head>

<body>

<div class="receipt">

<div class="center">
  <h3>A R SON'S STORE</h3>
  <div>GROCERY BILL</div>
</div>

<hr>

Date: <input type="date" id="date"><br>
Customer: <input id="customer">

<hr>

<table id="table">
<tr>
  <td><b>Item</b></td>
  <td><b>Rate</b></td>
  <td><b>Qty</b></td>
  <td><b>Amt</b></td>
</tr>

<tr>
  <td><input type="text" placeholder="Item name" style="text-align:left;"></td>
  <td><input type="number"></td>
  <td><input type="number"></td>
  <td class="amt">0</td>
</tr>

</table>

<button onclick="addRow()">+ Add Item</button>
<button onclick="calculate()">Calculate</button>

<hr>

Bill Total: ₹ <span id="total">0</span><br>
Prev Balance: ₹ 0<br>
Adj: ₹ 0

<hr>

<b>NET BAL: ₹ <span id="net">0</span></b>

<hr>

<div class="center">
  THANK YOU! VISIT AGAIN
</div>

<button onclick="window.print()">Print</button>

</div>

<script>

document.getElementById("date").valueAsDate = new Date();

function addRow() {
  let table = document.getElementById("table");
  let row = table.insertRow();

  row.innerHTML = `
    <td><input></td>
    <td><input type="number"></td>
    <td><input type="number"></td>
    <td class="amt">0</td>
  `;
}

function calculate() {
  let table = document.getElementById("table");
  let total = 0;

  for (let i = 1; i < table.rows.length; i++) {
    let rate = table.rows[i].cells[1].children[0].value || 0;
    let qty = table.rows[i].cells[2].children[0].value || 0;

    let amt = rate * qty;
    table.rows[i].cells[3].innerText = amt;

    total += amt;
  }

  document.getElementById("total").innerText = total;
  document.getElementById("net").innerText = total;
}

</script>

</body>
</html>
