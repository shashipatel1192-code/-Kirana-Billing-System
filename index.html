<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Patel Kirana Store</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            margin: 0;
            padding: 10px;
        }

        /* Screen Interface (Photo jaisa design) */
        #main-wrapper {
            background: white;
            border: 1px solid #333;
            width: 100%;
            max-width: 400px;
            padding: 10px;
            box-sizing: border-box;
        }

        .header { text-align: center; border-bottom: 1px dashed #000; padding-bottom: 5px; }
        .dashed-line { border-top: 1px dashed #000; margin: 5px 0; }
        
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { text-align: left; border-bottom: 1px solid #000; }
        
        /* Product Storage Section (Click-to-Add) */
        .inventory-section {
            margin-top: 15px;
            background: #fff;
            border: 1px solid #000;
            padding: 10px;
        }
        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            margin-top: 10px;
        }
        .p-btn {
            background: #eee;
            border: 1px solid #999;
            padding: 8px;
            font-size: 12px;
            cursor: pointer;
            text-align: center;
        }
        .p-btn:active { background: #ccc; }

        input { width: 100%; box-sizing: border-box; margin-bottom: 5px; padding: 5px; border: 1px solid #ccc; }
        button { width: 100%; padding: 8px; margin: 2px 0; cursor: pointer; background: #f0f0f0; border: 1px solid #333; font-family: inherit; }

        /* Thermal Printer (58mm) Optimization */
        @media print {
            .no-print, .inventory-section, input, button { display: none !important; }
            body { background: white; padding: 0; margin: 0; }
            #main-wrapper {
                border: none;
                width: 58mm;
                max-width: 58mm;
                padding: 2mm;
                position: absolute;
                left: 0; top: 0;
            }
            table { font-size: 12px; }
        }
    </style>
</head>
<body>

<div id="main-wrapper">
    <div class="header">
        <strong>PATEL KIRANA STORE MAILAWADA</strong><br>
        GROCERY BILL
    </div>
    <div class="dashed-line"></div>
    
    <div>
        Bill No: <span id="bill-no">1</span><br>
        Date: <span id="current-date"></span><br>
        Customer: <input type="text" placeholder="..." style="border:none; border-bottom:1px solid #ccc; width:60%;" class="no-print">
    </div>
    
    <div class="dashed-line"></div>
    
    <table>
        <thead>
            <tr>
                <th>Item</th>
                <th>Rate</th>
                <th>Qty</th>
                <th>Amt</th>
            </tr>
        </thead>
        <tbody id="bill-items">
            </tbody>
    </table>

    <div class="dashed-line"></div>
    <div style="display: flex; justify-content: space-between; font-weight: bold;">
        <span>Total:</span>
        <span id="total-val">₹ 0</span>
    </div>
    <div class="dashed-line"></div>

    <div class="no-print">
        <button onclick="window.print()">Print</button>
        <button onclick="clearBill()">Clear Bill</button>
    </div>
    
    <div style="text-align: center; font-size: 12px; margin-top: 10px;">
        THANK YOU! VISIT AGAIN
    </div>
</div>

<div class="inventory-section no-print" style="width: 100%; max-width: 400px;">
    <strong>Add Product to List</strong>
    <input type="text" id="p-name" placeholder="Name">
    <input type="number" id="p-rate" placeholder="Rate">
    <button onclick="saveProduct()">Save Product</button>
    
    <div class="dashed-line"></div>
    <strong>Quick Add (Click to Bill)</strong>
    <div class="product-grid" id="quick-list">
        </div>
</div>

<script>
    let bill = [];
    let products = JSON.parse(localStorage.getItem('my_items')) || [];

    // Date Setup
    document.getElementById('current-date').innerText = new Date().toLocaleDateString();

    function saveProduct() {
        const name = document.getElementById('p-name').value;
        const rate = document.getElementById('p-rate').value;
        if(name && rate) {
            products.push({name, rate: parseFloat(rate)});
            localStorage.setItem('my_items', JSON.stringify(products));
            renderProducts();
            document.getElementById('p-name').value = '';
            document.getElementById('p-rate').value = '';
        }
    }

    function renderProducts() {
        const list = document.getElementById('quick-list');
        list.innerHTML = '';
        products.forEach(p => {
            const b = document.createElement('div');
            b.className = 'p-btn';
            b.innerHTML = `${p.name}<br>₹${p.rate}`;
            b.onclick = () => addToBill(p);
            list.appendChild(b);
        });
    }

    function addToBill(p) {
        const exist = bill.find(item => item.name === p.name);
        if(exist) {
            exist.qty++;
        } else {
            bill.push({name: p.name, rate: p.rate, qty: 1});
        }
        updateTable();
    }

    function updateTable() {
        const tbody = document.getElementById('bill-items');
        tbody.innerHTML = '';
        let total = 0;
        bill.forEach(item => {
            let amt = item.rate * item.qty;
            total += amt;
            tbody.innerHTML += `<tr>
                <td>${item.name}</td>
                <td>${item.rate}</td>
                <td>${item.qty}</td>
                <td>${amt}</td>
            </tr>`;
        });
        document.getElementById('total-val').innerText = '₹ ' + total;
    }

    function clearBill() {
        bill = [];
        updateTable();
        document.getElementById('bill-no').innerText = parseInt(document.getElementById('bill-no').innerText) + 1;
    }

    renderProducts();
</script>

</body>
</html>
